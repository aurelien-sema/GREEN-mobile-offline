name: green_app
description: "Application mobile de détection de maladies des plantes avec IA - Naturellement Intelligent"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  
  # State Management & Routing
  provider: ^6.1.1
  go_router: ^14.2.0
  
  # Network & API
  http: ^1.2.0
  dio: ^5.4.0
  google_generative_ai: ^0.4.5
  
  # Camera & Images
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  
  # Storage & Preferences
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # Animations & UI Effects
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  
  # File handling
  file_picker: ^10.3.8
  
  # Size & Responsive
  responsive_sizer: ^3.3.1
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  connectivity_plus: ^5.0.2
  flutter_dotenv: ^5.0.2
  crypto: ^3.0.2
  # flutter_local_notifications: ^14.0.0 # Disabled due to Android build conflicts with flutter_local_notifications 14.x

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/rag/
    # Optionally package an env file so it is available on-device.
    # Create `assets/.env` (copy your root .env or create a secrets-free version)
    # and uncomment the following line to include it in the app bundle:
    - assets/.env

